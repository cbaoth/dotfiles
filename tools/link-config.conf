# -*- mode: sh; sh-shell: bash; indent-tabs-mode: nil; tab-width: 2 -*-
# vim: ft=bash:et:ts=2:sts=2:sw=2
# code: language=bash insertSpaces=true tabSize=2
# shellcheck shell=bash disable=SC2148
#
# Dotfiles linking configuration: repo source → home target pairs.

# Flat file syncing: repo_dir:home_dir pairs
# Files in repo_dir are symlinked to home_dir (no subdirectory nesting).
# Stale links pointing to deleted repo files are automatically cleaned up.
# External/custom symlinks in home_dir are preserved.
# shellcheck disable=SC2034 # SYNC_DIRS is used in link.sh
declare -A SYNC_DIRS=(
  ["${REPO_ROOT}/bin"]="$HOME/bin"
  ["${REPO_ROOT}/lib"]="$HOME/lib"
)
