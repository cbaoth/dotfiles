# -*- mode: sh; sh-shell: bash; indent-tabs-mode: nil; tab-width: 2 -*-
# vim: ft=bash:et:ts=2:sts=2:sw=2
# shellcheck shell=bash disable=SC2148
#
# /etc/nvidia-power-limit.conf — GPU power cap applied at boot.
#
# Mitigation for Xid 79 ("GPU has fallen off the bus") crashes caused by
# microsecond transient power spikes on Ada (40-series) cards.
# Background: docs/troubleshooting/gpu-xid79-bus-fall-off.md

# Power limit in watts.
#
# RTX 4070 Ti on motoko: default 285 W, min 100 W, max 340 W.
# Query the valid range for this card with:
#   nvidia-smi --query-gpu=power.default_limit,power.min_limit,power.max_limit --format=csv
#
# Tuning ladder — the point of this file is that you can walk it without
# editing any code. Change the value, `systemctl restart nvidia-power-limit`,
# then play and see whether Xid 79 comes back:
#
#   285  = stock (no cap). Set this to effectively disable the mitigation.
#   250  = first test. ~1-2% loss in games, ~2-4% on sustained AI compute.
#   240  = if 250 still crashes.
#   220  = aggressive; only if the above still crash.
#
# If even 220 W crashes, the cause is probably NOT transient spikes — stop
# lowering it and move down the list in the troubleshooting note (PSU, cable,
# reseat, PCIe Gen3, pcie_aspm=off).
NVIDIA_POWER_LIMIT_W=250

# GPU index. Single-GPU system, so 0.
NVIDIA_GPU_INDEX=0
