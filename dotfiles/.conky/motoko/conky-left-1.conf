conky.config = {
    xinerama_head = 2,
    alignment = 'top_left',
    background = false,
    border_width = 0,
    color1 = '#FFFFFF',
    color2 = '#6a7d93',
    color3 = '#0077FF',
    color4 = '#FFD000',
    default_color = '#FFFFFF',
    default_outline_color = '#000000',
    default_shade_color = '#6a7d93',
    cpu_avg_samples = 1,
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    gap_x = 10,
    gap_y = 10,
    border_outer_margin = 0,
    max_port_monitor_connections = 64,
    maximum_width = 470,
    minimum_width = 470,
    max_user_text = 16384,
    minimum_height = 480,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_x = false,
    out_to_wayland = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'dock',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,below',
    own_window_transparent = yes,
    own_window_argb_value = 200,
    own_window_colour = 'black',
    own_window_argb_visual = true,
    update_interval = 5,
    top_cpu_separate = true,
    top_name_width = 13,
    uppercase = false,
    use_xft = true,
    xftalpha = 0.8,
    font = 'FiraCode Nerd Font:size=9:regular',
    font1 = 'FiraCode Nerd Font:size=9:bold',
    font3 = 'FiraCode Nerd Font:bold:size=10'
};

conky.text = [[
${color3}${font3}${color3}SYSTEM STATUS${font}${color}

${color1}${font1}Hostname:${font} ${color}$nodename ${alignr}${color1}Kernel: ${color}$kernel
${color1}${font1}Uptime:${font} $uptime ${color1} ${alignr}${color1}Load: ${color}$loadavg
${color2}${hr 2}${color}
${color3}${font3}${color3}CPU: ${color4}${execi 3600 grep -m1 "model name" /proc/cpuinfo | sed 's/.*: //;s/(R)//g;s/(TM)//g;s/ Processor//;s/ CPU//;s/  */ /g'}${color}${font}${color}

${color1}${font1}Core \#1:${font} ${color}${freq_g 0}GHz ${alignr}${color1}${cpubar cpu0 6,340}
${color1}${font1}Core \#2:${font} ${color}${freq_g 1}GHz ${alignr}${color1}${cpubar cpu1 6,340}
${color1}${font1}Core \#3:${font} ${color}${freq_g 2}GHz ${alignr}${color1}${cpubar cpu2 6,340}
${color1}${font1}Core \#4:${font} ${color}${freq_g 3}GHz ${alignr}${color1}${cpubar cpu3 6,340}
${color1}${font1}Core \#5:${font} ${color}${freq_g 4}GHz ${alignr}${color1}${cpubar cpu4 6,340}
${color1}${font1}Core \#6:${font} ${color}${freq_g 5}GHz ${alignr}${color1}${cpubar cpu5 6,340}
${color1}${font1}Core \#7:${font} ${color}${freq_g 6}GHz ${alignr}${color1}${cpubar cpu6 6,340}
${color1}${font1}Core \#8:${font} ${color}${freq_g 7}GHz ${alignr}${color1}${cpubar cpu7 6,340}
${color1}${font1}Load:${font}    ${color}${cpu}%${color}
${color1}${font1}Tctl:${font}    ${color}${hwmon 6 temp 1}°C${color}
${color1}${font1}Tccd1:${font}   ${color}${hwmon 6 temp 3}°C${color}
${color2}${hr 2}${color}
${color3}${font3}SYSTEM MEMORY${font}${color}

${color1}${font1}RAM:${font} ${alignr}${color}$mem / $memmax ($memperc%)
${color3}${memgraph 75,470 07CC0D FF0000 -t}
${color1}${font1}SWAP: ${font} ${alignr}${color}$swap / $swapmax ($swapperc%${font1})${color}
${color2}${hr 2}${color}
${color3}${font3}GPU: ${color4}${execi 3600 nvidia-smi --query-gpu=name --format=csv,noheader 2>&1 | grep -vE 'Failed to initialize|version mismatch|library version' || echo '?'}${font}${color}

${color1}${font1}Temp:${font} ${color}${execi 5 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader  | grep -vE 'Failed to initialize|version mismatch|library version' || echo '?'}°C
${color1}${font1}Load:${font} ${color}${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader| grep -vE 'Failed to initialize|version mismatch|library version' || echo '?'}%
${color1}${font1}VRAM:${font} ${color}${execi 5 nvidia-smi --query-gpu=memory.used --format=csv,noheader| grep -vE 'Failed to initialize|version mismatch|library version' || echo '?'}MiB / ${execi 5 nvidia-smi --query-gpu=memory.total --format=csv,noheader | grep -vE 'Failed to initialize|version mismatch|library version' || echo '?'}MiB
${color2}${hr 2}${color}
${color3}${font3}TOP PROCESSES by CPU${font}${color}

${color1}${font1}Name               PID   CPU%  MEM% ${alignr}TIME${font}${color}
${color}${top name 1} ${top pid 1} ${top cpu 1} ${top mem_res 1}${alignr}${top time 1}
${color}${top name 2} ${top pid 2} ${top cpu 2} ${top mem_res 2}${alignr}${top time 2}
${color}${top name 3} ${top pid 3} ${top cpu 3} ${top mem_res 3}${alignr}${top time 3}
${color}${top name 4} ${top pid 4} ${top cpu 4} ${top mem_res 4}${alignr}${top time 4}
${color}${top name 5} ${top pid 5} ${top cpu 5} ${top mem_res 5}${alignr}${top time 5}
${color}${top name 6} ${top pid 6} ${top cpu 6} ${top mem_res 6}${alignr}${top time 6}
${color}${top name 7} ${top pid 7} ${top cpu 7} ${top mem_res 7}${alignr}${top time 7}
${color}${top name 8} ${top pid 8} ${top cpu 8} ${top mem_res 8}${alignr}${top time 8}
${color}${top name 9} ${top pid 9} ${top cpu 9} ${top mem_res 9}${alignr}${top time 9}
${color}${top name 10} ${top pid 10} ${top cpu 10} ${top mem_res 10}${alignr}${top time 10}
${color2}${hr 2}${color}
${color3}${font3}TOP PROCESSES by MEMORY${font}${color}

${color1}${font1}Name               PID   CPU%  MEM% ${alignr}TIME${font}${color}
${color}${top_mem name 1} ${top_mem pid 1} ${top_mem cpu 1} ${top_mem mem_res 1}${alignr}${top_mem time 1}
${color}${top_mem name 2} ${top_mem pid 2} ${top_mem cpu 2} ${top_mem mem_res 2}${alignr}${top_mem time 2}
${color}${top_mem name 3} ${top_mem pid 3} ${top_mem cpu 3} ${top_mem mem_res 3}${alignr}${top_mem time 3}
${color}${top_mem name 4} ${top_mem pid 4} ${top_mem cpu 4} ${top_mem mem_res 4}${alignr}${top_mem time 4}
${color}${top_mem name 5} ${top_mem pid 5} ${top_mem cpu 5} ${top_mem mem_res 5}${alignr}${top_mem time 5}
${color}${top_mem name 6} ${top_mem pid 6} ${top_mem cpu 6} ${top_mem mem_res 6}${alignr}${top_mem time 6}
${color}${top_mem name 7} ${top_mem pid 7} ${top_mem cpu 7} ${top_mem mem_res 7}${alignr}${top_mem time 7}
${color}${top_mem name 8} ${top_mem pid 8} ${top_mem cpu 8} ${top_mem mem_res 8}${alignr}${top_mem time 8}
${color}${top_mem name 9} ${top_mem pid 9} ${top_mem cpu 9} ${top_mem mem_res 9}${alignr}${top_mem time 9}
${color}${top_mem name 10} ${top_mem pid 10} ${top_mem cpu 10} ${top_mem mem_res 10}${alignr}${top_mem time 10}
]];
