# XDG Desktop Portal backend configuration for Sway.
# Without this, xdg-desktop-portal falls back to the GTK backend which requires
# a working X11 DISPLAY (:0) — absent in a Wayland-only Sway session — and
# crashes immediately at startup.
#
# Uses xdg-desktop-portal-wlr as the primary backend (wlroots-native, works
# with Sway without any X11 display). gtk is a fallback for dialog portals.
# Install: sudo apt install xdg-desktop-portal-wlr
#
# The gnome-keyring backend handles org.freedesktop.impl.portal.Secret.

[preferred]
default=wlr;gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.GlobalShortcuts=wlr
org.freedesktop.impl.portal.Secret=gnome-keyring
