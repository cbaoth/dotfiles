# ~/.config/foot/foot.ini — foot terminal configuration
# Only overrides foot's built-in defaults; anything unset keeps the default.
# Reference: man 5 foot.ini — https://codeberg.org/dnkl/foot

[main]
font=monospace:pixelsize=12

[key-bindings]
# Pipe the visible screen / full scrollback to an fzf picker (bin/foot-fzf-pick,
# linked into ~/bin) and copy the chosen line(s)/token(s) to the clipboard — a
# keyboard-only way to grab a path/hash/word from command output *above* the
# prompt, without the mouse. Paste with Ctrl+Shift+v (or middle-click).
#   Ctrl+Shift+g  → pick from the current screen
#   Ctrl+Shift+b  → pick from the whole scrollback
# foot-fzf-pick must be reachable on foot's $PATH (it is under sway launched
# from a login shell). Neither key is a foot default, so nothing is shadowed.
pipe-visible=[foot-fzf-pick] Control+Shift+g
pipe-scrollback=[foot-fzf-pick] Control+Shift+b
