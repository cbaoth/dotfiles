[general]
reaper_freq=5

; Switch to performance governor while gaming, restore on exit
desiredgov=performance

; Desktop with discrete GPU: disable iGPU/CPU power balance monitoring
igpu_power_threshold=-1

; SCHED_ISO (soft realtime) requires a patched kernel, keep off on upstream
softrealtime=off

; Renice game process to -10 (higher CPU priority); requires gamemode group
renice=10

; I/O scheduling: best-effort class, priority 0 (highest)
ioprio=0

; Prevent screensaver/display sleep while gaming
inhibit_screensaver=1

; Disable split lock mitigation while gaming, restore on exit
; Requires gamemode group membership (sudo usermod -aG gamemode $USER)
disable_splitlock=1

[cpu]
; Core parking/pinning: autodetection only works for Ryzen X3D and Intel P/E-core CPUs.
; Leave commented unless confirmed compatible with your CPU model.
;park_cores=no
;pin_cores=yes

[gpu]
; GPU overclocks — disabled; enable only after manually verifying safe headroom.
;apply_gpu_optimisations=accept-responsibility
;gpu_device=0
; AMD: amd_performance_level=high
; Nvidia: nv_powermizer_mode=1
