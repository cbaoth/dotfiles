-- ~/.conky/motoko/conkyrc-sysmon: system monitor (motoko / sway / Wayland)
--
-- Hardware:
--   CPU:    AMD Ryzen 9 9950X3D (8 cores allocated), k10temp @ hwmon6
--             hwmon6 temp1 = Tctl (die), temp3 = Tccd1 (CCD1 junction)
--   GPU:    NVIDIA GeForce RTX 4070 Ti (AD104) — nvidia-smi may be N/A
--   RAM:    92 GiB DDR5 (spd5118 @ hwmon7/8 for DIMM temps)
--   NVMe:   nvme0n1 Samsung 990 PRO 4TB  → /mnt/c (Windows) @ hwmon0
--           nvme1n1 Samsung 990 PRO 4TB  → /             @ hwmon1
--           nvme2n1 Crucial P3 Plus 4TB  → (unpartitioned) @ hwmon2
--   NIC:    enp6s0 (primary), enp7s0 (secondary), wlp14s0 (WiFi)
--   Screen: LG 38GN950 3840×1600 @ DP-1
--
-- hwmon index note: indices hwmon0-2 (NVMe) and hwmon6 (CPU) are assigned
-- at module load time. If temps show 0 or garbage after a reboot, verify:
--   for d in /sys/class/hwmon/hwmon*/name; do echo "$d: $(cat $d)"; done
-- and update indices below (or switch NVMe temps to the execi+sensors lines
-- that are shown commented out).

conky.config = {
    background = true,

    -- Native Wayland output — requires conky compiled with BUILD_WAYLAND=ON.
    -- This system has conky 1.22.2 with Wayland support compiled in.
    -- If the window does not appear, verify with: conky --version | grep -i wayland
    out_to_wayland = true,
    out_to_x = false,
    out_to_console = false,

    cpu_avg_samples = 3,
    net_avg_samples = 2,

    -- FiraCode Nerd Font is available at ~/.local/share/fonts/NerdFonts/
    use_xft = true,
    override_utf8_locale = true,
    font = "FiraCode Nerd Font:size=9",
    xftalpha = 1,

    update_interval = 2,

    -- Window — own_window_type "desktop" maps to the background layer in
    -- Wayland compositors that implement zwlr_layer_shell_v1 (sway does).
    -- X11 hints below are ignored under Wayland but kept for documentation.
    own_window = true,
    own_window_argb_visual = true,
    own_window_argb_value = 200,  -- 0 = fully transparent, 255 = fully opaque
    own_window_type = "desktop",
    own_window_class = "conky",
    own_window_colour = "black",  -- solid fallback if ARGB transparency fails
    own_window_hints = "undecorated,below,sticky,skip_taskbar,skip_pager",  -- X11 only

    double_buffer = true,
    draw_shades = false,
    draw_outline = false,
    draw_borders = true,
    stippled_borders = 0,
    border_inner_margin = 6,
    border_outer_margin = 2,
    border_width = 1,

    default_color = "white",
    default_shade_color = "black",
    default_outline_color = "grey",

    -- Position: top-right corner, 50px from edges (LG 38GN950 3840×1600 @ DP-1)
    alignment = "top_right",
    gap_x = 50,
    gap_y = 50,

    minimum_width = 340,
    maximum_width = 340,

    use_spacer = "none",
    no_buffers = true,
    uppercase = false,
    format_human_readable = true,
}

-- NVMe temp line alternative using sensors chip names (stable across reboots):
-- ${goto 14}${font :size=7}${color #888888}Temps: n0=${execi 5 sensors nvme-pci-0200 2>/dev/null | awk '/Composite/{gsub(/\+/,""); print $2; exit}'}  n1=${execi 5 sensors nvme-pci-0500 2>/dev/null | awk '/Composite/{gsub(/\+/,""); print $2; exit}'}  n2=${execi 5 sensors nvme-pci-0c00 2>/dev/null | awk '/Composite/{gsub(/\+/,""); print $2; exit}'}${font}

conky.text = [[
${font :bold:size=10}${color #0077FF}motoko${font}${alignr}${color #888888}${time %Y-%m-%d  %H:%M:%S}
${goto 14}${color #61BEFF}Kernel:${color lightgrey} ${kernel}${alignr}${color #61BEFF}Up:${color lightgrey} ${uptime_short}
${hr 2}
${font :bold:size=10}${color #0077FF}CPU Status:${voffset 4}${font}
${goto 14}${color #FFD000}${execi 3600 grep -m1 "model name" /proc/cpuinfo | sed 's/.*: //;s/(R)//g;s/(TM)//g;s/ Processor//;s/ CPU//;s/  */ /g'}
${goto 14}${font :size=8}${color #61BEFF}Tctl:${color lightgrey} ${hwmon 6 temp 1}°C  ${color #61BEFF}Tccd1:${color lightgrey} ${hwmon 6 temp 3}°C  ${color #61BEFF}Load:${color lightgrey} ${loadavg 1} ${loadavg 2} ${loadavg 3}${font}
${goto 24}${color #61BEFF}Core 1:${alignr}${font :size=8}${color lightgrey}${freq_g 1}GHz  ${color #61BEFF}${cpubar cpu1 6,100}${font}
${goto 24}${color #61BEFF}Core 2:${alignr}${font :size=8}${color lightgrey}${freq_g 2}GHz  ${color #61BEFF}${cpubar cpu2 6,100}${font}
${goto 24}${color #61BEFF}Core 3:${alignr}${font :size=8}${color lightgrey}${freq_g 3}GHz  ${color #61BEFF}${cpubar cpu3 6,100}${font}
${goto 24}${color #61BEFF}Core 4:${alignr}${font :size=8}${color lightgrey}${freq_g 4}GHz  ${color #61BEFF}${cpubar cpu4 6,100}${font}
${goto 24}${color #61BEFF}Core 5:${alignr}${font :size=8}${color lightgrey}${freq_g 5}GHz  ${color #61BEFF}${cpubar cpu5 6,100}${font}
${goto 24}${color #61BEFF}Core 6:${alignr}${font :size=8}${color lightgrey}${freq_g 6}GHz  ${color #61BEFF}${cpubar cpu6 6,100}${font}
${goto 24}${color #61BEFF}Core 7:${alignr}${font :size=8}${color lightgrey}${freq_g 7}GHz  ${color #61BEFF}${cpubar cpu7 6,100}${font}
${goto 24}${color #61BEFF}Core 8:${alignr}${font :size=8}${color lightgrey}${freq_g 8}GHz  ${color #61BEFF}${cpubar cpu8 6,100}${font}
${hr 2}
${font :bold:size=10}${color #0077FF}Memory:${voffset 4}${font}
${goto 14}${color #61BEFF}RAM:  ${color lightgrey}${mem} / ${memmax}${alignr}${color #FFD000}${membar 6,130}
${goto 14}${color #61BEFF}Swap: ${color lightgrey}${swap} / ${swapmax}${alignr}${color #61BEFF}${swapbar 6,130}
${hr 2}
${font :bold:size=10}${color #0077FF}GPU:${voffset 4}${font}
${goto 14}${color #FFD000}GeForce RTX 4070 Ti (AD104)
${goto 14}${color #61BEFF}Temp: ${color lightgrey}${execi 5 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader 2>/dev/null | grep -v "^$" || echo "N/A"}°C  ${color #61BEFF}Util: ${color lightgrey}${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader 2>/dev/null | grep -v "^$" || echo "N/A"}
${goto 14}${color #61BEFF}VRAM: ${color lightgrey}${execi 5 nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader 2>/dev/null | grep -v "^$" || echo "N/A"}
${hr 2}
${font :bold:size=10}${color #0077FF}Storage:${voffset 4}${font}
${goto 14}${color lightgrey}${font :size=8}/:      ${alignr}${fs_used_perc /}%  ${color #FFD000}${fs_bar 6,110 /}${font}
${goto 14}${color lightgrey}${font :size=8}/boot:  ${alignr}${fs_used_perc /boot}%  ${color #61BEFF}${fs_bar 6,110 /boot}${font}
${voffset 2}${color #0077FF}${diskiograph nvme1n1 20,340 000000 FFD000}
${voffset -2}${goto 14}${font :size=7}${color #FFD000}nvme1n1 (root)  ${color lightgrey}r:${diskio_read nvme1n1}/s  w:${diskio_write nvme1n1}/s${font}
${goto 14}${font :size=7}${color #888888}Temps: n0(win)=${hwmon 0 temp 1}°C  n1(/)=${hwmon 1 temp 1}°C  n2=${hwmon 2 temp 1}°C${font}
${hr 2}
${font :bold:size=10}${color #0077FF}Network:${voffset 4}${font}
${goto 14}${color #61BEFF}enp6s0: ${color lightgrey}${addr enp6s0}
${goto 14}${color #61BEFF}↓ ${color lightgrey}${downspeed enp6s0}/s  ${alignr}${color #61BEFF}↑ ${color lightgrey}${upspeed enp6s0}/s
${color #0077FF}${downspeedgraph enp6s0 20,168 000000 61BEFF}${alignr}${upspeedgraph enp6s0 20,168 000000 FFD000}
${hr 2}
${font :bold:size=10}${color #0077FF}TOP Processes:${voffset 4}${font}
${goto 14}${font :bold:size=9}${color #0077FF}CPU${goto 155}PID${goto 200}CPU%${goto 248}MEM%${font :size=8}
${goto 14}${color #FFD000}${top name 1}${goto 150}${top pid 1}${goto 195}${top cpu 1}${goto 243}${top mem 1}
${goto 14}${color #61BEFF}${top name 2}${color lightgrey}${goto 150}${top pid 2}${goto 195}${top cpu 2}${goto 243}${top mem 2}
${goto 14}${color #61BEFF}${top name 3}${color lightgrey}${goto 150}${top pid 3}${goto 195}${top cpu 3}${goto 243}${top mem 3}
${voffset 5}${goto 14}${font :bold:size=9}${color #0077FF}MEM${goto 155}PID${goto 200}CPU%${goto 248}MEM%${font :size=8}
${goto 14}${color #FFD000}${top_mem name 1}${goto 150}${top_mem pid 1}${goto 195}${top_mem cpu 1}${goto 243}${top_mem mem 1}
${goto 14}${color #61BEFF}${top_mem name 2}${color lightgrey}${goto 150}${top_mem pid 2}${goto 195}${top_mem cpu 2}${goto 243}${top_mem mem 2}
${goto 14}${color #61BEFF}${top_mem name 3}${color lightgrey}${goto 150}${top_mem pid 3}${goto 195}${top_mem cpu 3}${goto 243}${top_mem mem 3}
]]
