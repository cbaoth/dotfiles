-- Prerequisites (drive temperature sensors):
-- * drivetemp kernel module for SATA temps (already active if sensors shows drivetemp-scsi-*):
--     echo drivetemp | sudo tee /etc/modules-load.d/drivetemp.conf  (persist across reboots)
-- * NVMe and NIC temps require no extra setup — kernel exposes via /sys hwmon
-- * No root required for any of these readings
conky.config = {
    xinerama_head = 2,
    alignment = 'top_left',
    background = false,
    border_width = 0,
    color1 = '#FFFFFF',
    color2 = '#6a7d93',
    color3 = '#0077FF',
    color4 = '#FFD000',
    default_color = '#FFFFFF',
    default_outline_color = '#000000',
    default_shade_color = '#6a7d93',
    cpu_avg_samples = 1,
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    gap_x = 510,
    gap_y = 10,
    border_outer_margin = 0,
    max_port_monitor_connections = 64,
    maximum_width = 470,
    minimum_width = 470,
    max_user_text = 16384,
    minimum_height = 480,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_x = false,
    out_to_wayland = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'dock',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,below',
    own_window_transparent = yes,
    own_window_argb_value = 200,
    own_window_colour = 'black',
    own_window_argb_visual = true,
    update_interval = 5,
    top_cpu_separate = true,
    top_name_width = 13,
    uppercase = false,
    use_xft = true,
    xftalpha = 0.8,
    font = 'FiraCode Nerd Font:size=9:regular',
    font1 = 'FiraCode Nerd Font:size=9:bold',
    font3 = 'FiraCode Nerd Font:bold:size=10'
};

conky.text = [[
${color3}${font3}FILE SYSTEMS - LINUX${font}${color}

${color1}${font1}Mount:${font} ${color}/ (root) ${alignr}${color}${fs_used /}/${fs_size /} (${fs_used_perc /}%)
${color1}${font1}R/W:${font}   ${color}${diskio_read /dev/nvme1n1p3}/${diskio_write /dev/nvme1n1p3}
${color1}${font1}Temp:${font}  ${color}${execi 60 $HOME/.local/conky/bin/conky-sensors nvme nvme1}°C
${color3}${diskiograph /dev/nvme1n1p3 60,470 07CC0D FF0000 -t}
${color2}${hr 2}${color}
${color3}${font3}FILE SYSTEMS - WINDOWS${font}${color}

${color1}${font1}Mount:${font} ${color}/mnt/c (C:) ${alignr}${fs_used /mnt/c}/${fs_size /mnt/c} (${fs_used_perc /mnt/c}%)
${color1}${font1}R/W:${font}   ${color}${diskio_read /dev/nvme0n1p3}/${diskio_write /dev/nvme0n1p3}
${color1}${font1}Temp:${font}  ${color}${execi 60 $HOME/.local/conky/bin/conky-sensors nvme nvme0}°C
${color1}${diskiograph /dev/nvme0n1p3 60,470 07CC0D FF0000 -t}
${color1}${font1}Mount:${font} ${color}/mnt/d (D:) ${alignr}${fs_used /mnt/d}/${fs_size /mnt/d} (${fs_used_perc /mnt/d}%)
${color1}${font1}R/W:${font}   ${color}${diskio_read /dev/nvme2n1p2}/${diskio_write /dev/nvme2n1p2}
${color1}${font1}Temp:${font}  ${color}${execi 60 $HOME/.local/conky/bin/conky-sensors nvme nvme2}°C
${color1}${diskiograph /dev/nvme0n1p3 60,470 07CC0D FF0000 -t}
${color1}${font1}Mount:${font} ${color}/mnt/e (E:) ${alignr}${fs_used /mnt/e}/${fs_size /mnt/e} (${fs_used_perc /mnt/e}%)
${color1}${font1}R/W:${font}   ${color}${diskio_read /dev/sda1}/${diskio_write /dev/sda1}
${color1}${font1}Temp:${font}  ${color}${execi 60 $HOME/.local/conky/bin/conky-sensors sata sda}°C
${color1}${diskiograph /dev/nvme0n1p3 60,470 07CC0D FF0000 -t}
${color1}${font1}Mount:${font} ${color}/mnt/f (F:) ${alignr}${fs_used /mnt/f}/${fs_size /mnt/f} (${fs_used_perc /mnt/f}%)
${color1}${font1}R/W:${font}   ${color}${diskio_read /dev/sdb1}/${diskio_write /dev/sdb1}
${color1}${font1}Temp:${font}  ${color}${execi 60 $HOME/.local/conky/bin/conky-sensors sata sdb}°C
${color1}${diskiograph /dev/nvme0n1p3 60,470 07CC0D FF0000 -t}
${color2}${hr 2}${color}
${color3}${font3}FILE SYSTEMS - NETWORK${font}${color}

${color1}${font1}Mount:${font} ${color}/srv/saito/data   (saito:data) ${alignr}${fs_used /srv/saito/data}/${fs_size /srv/saito/data} (${fs_used_perc /srv/saito/data}%)
${color1}${font1}Mount:${font} ${color}/srv/saito/stash  (saito:stash) ${alignr}${fs_used /srv/saito/stash}/${fs_size /srv/saito/stash} (${fs_used_perc /srv/saito/stash}%)
${color1}${font1}Mount:${font} ${color}/srv/saito/backup (saito:backup) ${alignr}${fs_used /srv/saito/backup}/${fs_size /srv/saito/backup} (${fs_used_perc /srv/saito/backup}%)
]];
