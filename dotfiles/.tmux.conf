# ~/.tmux.conf

# ----------------------------------------------------------------------------
# General tmux configuration
# ----------------------------------------------------------------------------
# Make tmux more pleasant to use
set -g mouse on
set -g default-terminal "tmux-256color"
#set -g terminal-overrides ',xterm-256color:RGB'
#set -g default-terminal "${TERM}"

# Set the prefix key to Ctrl-a (same as screen, instead of the default Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

setw -g mode-keys vi

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard

# Show status bar on top (default: bottom)
# Seems convenient; also catppuccin + zsh can cause glitches in some terminals (line shift)
set -g status-position top
# ----------------------------------------------------------------------------
# Catappuccin theme for tmux
# https://github.com/catppuccin/tmux
# ----------------------------------------------------------------------------
# Manual installation
# Officially recommended over using TPM (may have issues with name conflicts)
#   mkdir -p ~/.config/tmux/plugins/catppuccin
#   git clone -b v2.3.0 https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin/tmux
# Add `run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux` to `~/.tmux.conf`
#   tmux source ~/.tmux.conf

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
#run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
# For TPM, instead use `run ~/.tmux/plugins/tmux/catppuccin.tmux`

## Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Load status plugins used above (not needed, using TPM instead, see below)
#run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
#run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
# ----------------------------------------------------------------------------
# TPM - Tmux Plugin Manager
# https://github.com/tmux-plugins/tpm
# ----------------------------------------------------------------------------
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux#v2.3.0' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'tmux-plugins/tpm'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Use prefix + I to install plugins after cloning this repo and sourcing tmux.conf
# Use prefix + U to update plugins
# Use prefix + alt + u to uninstall plugins

